author: b0yi
date: 2026-04-19
question: |
  一位工程師剛建好了一個 HNSW 索引，
  經過驗證後，他發現系統最近鄰搜尋的延遲非常低，
  但是召回率（Recall）不如預期，大約只有 70%。如果她希望在**不重新建構索引**的前提下，
  盡可能提升這個 HNSW 系統的召回率，她應該採取下列何種做法？且該做法背後的機制為何？
options:
  - text: "增大 `efSearch` 的值。這會在使用 beam search 的底層搜尋階段增加追蹤的候選點數量，雖然會增加延遲，但能探索更多局部區域以提高召回率。"
    correct: true
    explanation: |
      `efSearch` 是專門用於查詢階段的參數，控制著底層 beam search 的寬度（beam width）。
      可以在不改變原有圖結構（不用重新建構索引）的前提下即時調整。增大 `efSearch` 能在最後階段保留並測試更多候選路線，從而有效提升找到真正最近鄰的可能性（提高召回率），代價是搜尋時間變長。
  - text: "增大 `efConstruction` 的值。這會在搜尋時探索更大範圍的相鄰節點，幫助演算法跳出局部最佳解以提升召回率。"
    explanation: |
      `efConstruction` 是「建構索引」時使用的參數，決定插入新節點時尋找鄰居的 beam width 大小。
      一旦 HNSW 的圖結構建構完成，在查詢時調整這個參數將沒有任何作用，因此無法幫助解決已建好之索引召回率過低的問題。
  - text: "增大參數 $M$ 的值。這會讓圖中每個節點保留更多實體連線，增加圖的連通性，確保查詢時能檢查更多鄰近的分支路線。"
    explanation: |
      參數 $M$ 控制的是圖中每個節點在每一層的最大連接數。
      如果要改變 $M$ 並且發生作用，系統就必須為現有節點重新配對並建立更多的邊連接，這代表必須去修改或重新建構整個底圖結構，違反了題目設定「不重新建構索引」的前提。
  - text: "增大 `efSearch` 的值。這主要是讓系統在頂層進入圖時也保留多個候選點，放棄單一的 greedy search，進而早在高層就鎖定多個最接近的區域。"
    explanation: |
      雖然選項指出的調整對象正確（增大 `efSearch`），但描述的運作機制是錯誤的。
      在典型的 HNSW 設計中，於上方較稀疏的圖層下降過程中，系統通常只會維持一個候選點（$ef=1$）進行 greedy search，以達成最快速的大範圍跳躍。參數 `efSearch` 主要用途是決定在底層密集區中，進行精確 local beam search 的廣度。
