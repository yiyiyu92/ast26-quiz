author: ZMYsamuel
date: 2026-04-02
question: |
  工程師在優化 LSM-tree 的讀取效能時，考慮將現有每個元素的位元分配（$m/n$）從 15 提升至 25。下列哪一個判斷最符合工程實務上的權衡？
options:
  - text: "不建議使用此更動。因為當 $m/n$ 超過 15 之後，再增加記憶體對降低 FPR 的邊際效益會顯著遞減，且仍無法消除 false positive。"
    correct: true
    explanation: |
      從 $m/n = 10$ 增加到 15 時，FPR 會從 0.82% 降至 0.03%（降幅達 27 倍）；但從 15 再往上增加（如至 20 以上），FPR 的下降幅度會變得很小。在記憶體資源有限的儲存系統中，這類高 $m/n$ 的配置通常不具效益。此外，Bloom filter 是機率性結構，無論 $m$ 多大都無法達到 100% 準確率。
  - text: "建議使用此更動。因為 $m/n$ 與 FPR 呈線性反比關係，將空間提升至 25 bits 將能直接減少約 60% 的誤判率，進一步保護 disk。"
    explanation: |
      FPR 與 $m/n$ 並非簡單的線性關係，而是呈指數級變化的。雖然增加空間能降低 FPR，但跨過特定門檻（如大抄提到的 15）後，每一單位的記憶體投資所換取的 FPR 降幅會快速縮小，並非單純的線性減少。
  - text: "不建議使用此更動。因為增加位元陣列大小 $m$ 會導致最佳的雜湊函數數量 $k$ 隨之增加，進而引發 false negative 的風險。"
    explanation: |
      增加 $m$ 確實會使最佳的 $k$ 值隨之增加（$k \approx 0.693 \times m/n$），這會稍微增加 CPU 運算成本，但 **false negative** 是由「刪除位元」或「硬體錯誤」導致的。增加位元陣列空間本身絕不會導致原本存在的資料被判定為不存在。
  - text: "建議使用此更動。因為即使 $m/n$ 提升至 25，其總體記憶體消耗仍遠低於傳統 hash set，且能同時滿足支援刪除操作的需求。"
    explanation: |
      雖然 Bloom filter 的空間效率確實仍優於 hash set（17 倍以上差距），但增加空間並不能解決標準版不支援刪除的問題。不支援刪除是源於位元共享（collision）的結構本質，而非空間配置不足。
