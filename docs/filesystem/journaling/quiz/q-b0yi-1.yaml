author: b0yi
date: 2026-05-02
question: |
  某團隊要為兩種 workload 選擇底層檔案系統：
  1. 備份伺服器：需要頻繁為大量檔案建立 snapshot。
  2. 關聯式資料庫：對檔案有極為頻繁的 in-place update。

  在 ext4（journaling）與 Btrfs（CoW）之間做選擇，下列敘述何者最正確？
options:
  - text: "對於資料庫，應避免使用 Btrfs。因為 CoW 機制的 out-of-place update 特性會導致 fragmentation 以及 Wandering Tree 造成的寫入放大；備份伺服器適合 Btrfs，因為保留舊的 root pointer 即可完成 snapshot。"
    correct: true
    explanation: |
      正確。CoW 在寫入時會將修改後的資料與 metadata 沿著 path 一路寫到新的 root，這能支援 snapshot，但也意味著原本連續的資料在反覆修改後會散落各處（碎片化），引發效能與寫入放大問題，因此並不適合原地修改頻繁的資料庫。
  - text: "對於備份伺服器，ext4 是更好的選擇。ordered mode 能確保 snapshot 拍攝當下 data 與 metadata 的一致性，這比 Btrfs 的 CoW snapshot 更可靠。"
    explanation: |
      錯誤。ext4 本身並不天然支援快速的 snapshot，且 ordered mode 只保證 data 先於 metadata flush 進入正式位置，並不會將 data 寫入 journal。備份伺服器若需要頻繁的瞬間 snapshot，Btrfs 才是首選。
  - text: "兩者皆可勝任資料庫負載。雖然 ext4 有 journal 寫入的 overhead，但檔案系統的 Btrfs CoW 與作業系統的虛擬記憶體 CoW (ex: fork) 一樣是 Lazy 機制，只有當資料真的被讀寫發生 page fault 時才會複製，因此寫入效能極高。"
    explanation: |
      錯誤。這兩者的機制在時機上有本質的差異。檔案系統的 CoW 是 eager 的，每一次 write 呼叫都會立刻寫入新 block 並觸發 pointer cascade；而 OS 記憶體的 CoW 是 Lazy 的。
  - text: "為了避免資料庫因斷電產生半新半舊的殘局 crash window，必須使用 CoW 機制。因為只有 CoW 透過 atomic root pointer swap 才能解決 crash consistency 問題，而採用 in-place update 的 Journaling 檔案系統在斷電後將無法回復到 valid state。"
    explanation: |
      錯誤。Journaling 檔案系統同樣能夠解決 crash consistency 問題。它透過寫入 Write-Ahead Log (WAL) 與 commit record，即便遭遇斷電，重開機時也能藉由 replay journal 將檔案系統復原至 valid state。
