author: Gengan811
date: '2026-05-13'
question: |
  某系統管理員在 Btrfs（CoW 檔案系統）上為 1TB 的資料庫建立 snapshot。建立瞬間，硬碟可用空間幾乎沒有減少。在一週的高頻率資料庫更新後，系統整體的硬碟使用量明顯增加。
  
  請問在 CoW 架構下，造成此現象的核心機制為何？
options:
  - text: "Snapshot 透過共用 root pointer 與 refcount +1 達到零初始消耗。後續覆寫時 CoW 寫入新 block，舊 block 因被 snapshot 引用而無法回收，導致使用量增加。"
    correct: true
    explanation: |
      這是正確的。CoW 的 snapshot 保留了建立時的 root pointer。在建立瞬間，它與活躍系統共用實體空間。當活躍系統更新資料時，CoW 不在原位覆寫，而是將新資料分配到新的 block。舊 block 因為還被 snapshot 引用，無法被視為 free space 進行回收，進而佔用額外的硬碟容量。
  - text: "Snapshot 在背景非同步 copy 1TB 資料到備份磁區，一週後容量增加是因為背景複製作業完成。"
    explanation: |
      CoW 建立 snapshot 時不執行資料 block 的物理拷貝，而是依靠指標（pointer）共用與 reference count 機制來達到狀態備份。背景複製是傳統 LVM mirror 或 storage array 的做法。
  - text: "Snapshot 使用 delta compression，記錄新舊資料的 binary diff；容量增加是因為累積過多未合併的差異紀錄。"
    explanation: |
      CoW 檔案系統直接以 block 為單位進行重新分配，並非計算資料的二進位差異（diffs）。只要該 block 內有資料被修改，CoW 就會分配並寫入一個完整的全新 block，而不是僅儲存 delta 紀錄。
  - text: "Snapshot 等同 hardlink 不佔空間，但 Btrfs 會在 snapshot 存在期間切換到 data journaling 模式，所有寫入都寫兩次造成容量增加。"
    explanation: |
      CoW 架構透過 root pointer 切換即可維持 crash consistency，不依賴 journal。硬碟空間增加是因為保留舊 block 加上寫入了新 block，而非系統切換至 data journaling 模式導致寫入兩次。
