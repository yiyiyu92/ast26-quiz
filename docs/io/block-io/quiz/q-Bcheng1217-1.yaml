author: Bcheng1217
date: '2026-03-31'
question: |
  某遊戲引擎需要載入一萬個散落的 4KB 小檔案。團隊經歷三次迭代：(1) 單一執行緒 synchronous I/O 逐一讀取，載入極慢；(2) 改用 asynchronous I/O 一次提交所有請求，載入變快但觸發上萬次 interrupt，CPU 負載飆高；(3) 將小檔案預先打包成一個 40MB 連續檔案，改回單次 synchronous I/O 讀取。關於這三次迭代背後的 block I/O 原理，下列何者最精確？
options:
  - text: "版本(1) 的瓶頸在 IOPS 並發不足；版本(2) 解決並發但引發 interrupt storm；版本(3) 將 workload 從 random small I/O 轉為 sequential large I/O，瓶頸轉移至 bandwidth。"
    correct: true
    explanation: |
      版本(1) 的單一執行緒與 synchronous I/O 模式因為一次只能有一個執行中（in-flight）的請求，無法產生足夠的並發 I/O 來發揮硬體的 IOPS 能力；版本(2) 利用 asynchronous I/O 解決了阻塞問題並提升了並發度，但大量的小型 I/O 完成通知引發了中斷風暴；版本(3) 透過打包檔案，受限於 IOPS 的隨機讀取轉化為受限於 bandwidth 的連續讀取，僅需少數的 I/O 請求與中斷即可完成相同資料量的傳輸。
  - text: "版本(2) CPU 負載飆高是因為 asynchronous I/O 繞過 block device abstraction，CPU 必須以 byte 為單位搬運資料。"
    explanation: |
      無論是 synchronous 或 asynchronous I/O，作業系統與硬體溝通時始終遵循 block device abstraction 的規範，以固定大小的區塊（block）為單位進行操作，不會直接以位元組（byte）為單位存取。版本(2) 的 CPU 飆高是因為處理大量 interrupt 的 context switch cost。
  - text: "版本(3) 讀取 40MB 檔案時，驅動程式會自動切成一萬個 4KB 請求以最大化 IOPS，並強制使用 polling。"
    explanation: |
      讀取連續的 40MB 大檔案屬於 sequential large I/O，其效能指標在於 bandwidth 而非 IOPS。雖然作業系統或硬體底層可能會依照最大傳輸單元分割大請求，但其目的是最大化連續傳輸的頻寬，而非追求高 IOPS，也不會強制綁定 polling 模式。
  - text: "版本(1) 的瓶頸在 bandwidth 不足；版本(3) 證明只要檔案夠大，synchronous I/O 就不會 block 執行緒。"
    explanation: |
      讀取散落的 4KB 小檔案（random small I/O）的瓶頸在於 IOPS，而非 bandwidth。此外，使用 synchronous I/O 時，無論讀取的檔案多大，發出系統呼叫的執行緒都一定會被 block ，直到資料完全載入記憶體為止。
