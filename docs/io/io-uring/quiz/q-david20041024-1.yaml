author: david20041024
date: 2026-03-19
question: |
  在高效能儲存系統（如使用 io_uring 與 NVMe SSD）的架構設計中，關於 I/O 處理，下列何者最為精確？
options:
  - text: "Fibers 能在單一執行緒中彼此平行運算，因此在 SQ/CQ 高負載時，硬體 I/O 能獲得加速。"
    explanation: |
      Fibers 是 user-space 的協作式協程，提供並行的控制流，讓單一執行緒可以在等待 I/O 時切換到其他任務，但 Fibers 不提供真正的平行運算。
  - text: "在 io_uring 中，因為 Kernel 與 User 共享 SQ/CQ 空間，所以可以實現 SQE 的 Batch submission，減少 syscall 的次數。"
    correct: true
    explanation: |
      通常 io_uring 的 SQ/CQ 是共享，User 可以一次寫入多個 SQE，然後只花費一個 syscall。
  - text: "SQE 的資料結構通常為 16 bytes，而 CQE 為 64 bytes，因為CQE 需要儲存大量回傳的資料。"
    explanation: |
      通常 SQE 的資料結構通常為 64 bytes，儲存操作指令等，而 CQE 的資料結構通常為 16 bytes，僅儲存狀態等資訊。
  - text: "Zero-copy 中，仍然需要將資料複製到 Kernel 空間，以保證安全性。"
    explanation: |
      Zero-copy 的核心在於繞過 Kernel Page Cache，資料直接在 User Buffer 與儲存裝置間傳輸，藉此消除 Kernel 與 User 空間之間的資料拷貝開銷。